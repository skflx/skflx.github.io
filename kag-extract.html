<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAG Extractor | skflx.MD</title>
    <meta name="description" content="Claude API-powered Markdown to knowledge graph JSON extractor for OHNS study.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* ── Reset & Base ──────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-primary: #0D0F14;
            --bg-surface: #161920;
            --bg-elevated: #1E2029;
            --bg-hover: #262833;
            --border: #2A2D3A;
            --border-focus: #4A9EFF;
            --accent: #4A9EFF;
            --accent-glow: rgba(74,158,255,0.15);
            --success: #51CF66;
            --danger: #FF6B6B;
            --warning: #FFD43B;
            --text-primary: #E8EAF0;
            --text-secondary: #9CA3B0;
            --text-muted: #5C6370;
            --font-body: 'IBM Plex Sans', -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --radius: 8px;
            --radius-lg: 12px;
            --transition: 200ms ease;
        }
        html { height: 100%; }
        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100%;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Grid overlay on body ─────────────────────── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image:
                linear-gradient(rgba(74,158,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74,158,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* ── Header ───────────────────────────────────── */
        .header {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 10;
        }
        .header-left { display: flex; align-items: center; gap: 1rem; }
        .logo {
            font-family: var(--font-mono);
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: -0.02em;
        }
        .logo-sub {
            font-family: var(--font-body);
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-left: 0.5rem;
            padding-left: 0.5rem;
            border-left: 1px solid var(--border);
        }
        .header-nav { display: flex; gap: 0.5rem; }
        .header-nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.8rem;
            padding: 0.35rem 0.65rem;
            border-radius: var(--radius);
            transition: all var(--transition);
        }
        .header-nav a:hover { color: var(--text-primary); background: var(--bg-hover); }

        /* ── Main layout ──────────────────────────────── */
        .main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            position: relative;
            z-index: 1;
        }
        @media (max-width: 900px) {
            .main { grid-template-columns: 1fr; grid-template-rows: auto auto; }
        }

        /* ── Panels ───────────────────────────────────── */
        .panel {
            display: flex;
            flex-direction: column;
            padding: 1.25rem;
            overflow: hidden;
        }
        .panel-left { border-right: 1px solid var(--border); }
        @media (max-width: 900px) {
            .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            flex-shrink: 0;
        }
        .panel-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        /* ── API Key row ──────────────────────────────── */
        .api-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            flex-shrink: 0;
        }
        .api-row label {
            font-size: 0.78rem;
            color: var(--text-secondary);
            white-space: nowrap;
            font-weight: 500;
        }
        .api-row input {
            flex: 1;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.78rem;
            padding: 0.45rem 0.65rem;
            outline: none;
            transition: border-color var(--transition);
        }
        .api-row input:focus { border-color: var(--border-focus); }
        .api-status {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .api-status.saved { background: var(--success); }
        .api-status.empty { background: var(--text-muted); }

        /* ── Textarea ─────────────────────────────────── */
        .input-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 300px;
        }
        #md-input {
            flex: 1;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.82rem;
            line-height: 1.6;
            padding: 1rem;
            resize: none;
            outline: none;
            transition: border-color var(--transition);
        }
        #md-input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--accent-glow); }
        #md-input::placeholder { color: var(--text-muted); }

        /* ── Buttons ──────────────────────────────────── */
        .btn {
            font-family: var(--font-body);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .btn-primary:hover { background: #3A8EEF; }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--border);
        }
        .btn-secondary:hover { background: var(--bg-elevated); border-color: var(--text-muted); }
        .btn-success {
            background: rgba(81,207,102,0.15);
            color: var(--success);
            border-color: rgba(81,207,102,0.3);
        }
        .btn-success:hover { background: rgba(81,207,102,0.25); }
        .btn-danger {
            background: rgba(255,107,107,0.1);
            color: var(--danger);
            border-color: rgba(255,107,107,0.2);
        }
        .btn-danger:hover { background: rgba(255,107,107,0.2); }

        .btn-row {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        /* ── Extract action bar ───────────────────────── */
        .extract-bar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 0.75rem;
            flex-shrink: 0;
        }
        .char-count {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }
        .char-count.warn { color: var(--warning); }

        /* ── Output panel ─────────────────────────────── */
        .output-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 300px;
        }
        #json-output {
            flex: 1;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.78rem;
            line-height: 1.55;
            padding: 1rem;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
        #json-output .node-count { color: var(--accent); }
        #json-output .edge-count { color: var(--success); }

        /* ── Status / progress ────────────────────────── */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0;
            flex-shrink: 0;
        }
        .status-text {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .status-text.error { color: var(--danger); }
        .status-text.success { color: var(--success); }
        .spinner {
            width: 14px; height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── JSON preview badges ──────────────────────── */
        .preview-stats {
            display: flex;
            gap: 1rem;
            padding: 0.5rem 0;
            flex-shrink: 0;
        }
        .stat-badge {
            font-size: 0.72rem;
            font-family: var(--font-mono);
            padding: 0.25rem 0.6rem;
            border-radius: var(--radius);
            font-weight: 600;
        }
        .stat-badge.nodes { background: rgba(74,158,255,0.15); color: var(--accent); }
        .stat-badge.edges { background: rgba(81,207,102,0.15); color: var(--success); }

        /* ── Empty state ──────────────────────────────── */
        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-align: center;
            gap: 0.5rem;
        }
        .empty-state svg { width: 48px; height: 48px; opacity: 0.3; }
        .empty-state p { font-size: 0.82rem; }
        .empty-state .hint { font-size: 0.72rem; max-width: 280px; }

        /* ── Scrollbar ────────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ── Toast ─────────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 0.8rem;
            padding: 0.6rem 1.2rem;
            border-radius: var(--radius-lg);
            z-index: 100;
            opacity: 0;
            transition: all 300ms ease;
            pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { border-color: rgba(81,207,102,0.4); }
        .toast.error { border-color: rgba(255,107,107,0.4); }
    </style>
</head>
<body>

<!-- Header -->
<header class="header">
    <div class="header-left">
        <a href="kag.html" class="logo">KAG</a>
        <span class="logo-sub">Extractor</span>
    </div>
    <nav class="header-nav">
        <a href="kag.html">Atlas</a>
        <a href="index.html">Home</a>
    </nav>
</header>

<!-- Main -->
<div class="main">
    <!-- Left: Input -->
    <div class="panel panel-left">
        <div class="panel-header">
            <span class="panel-title">Markdown Input</span>
        </div>

        <div class="api-row">
            <label for="api-key">API Key</label>
            <input type="password" id="api-key" placeholder="sk-ant-…" autocomplete="off">
            <div id="api-status" class="api-status empty" title="Not set"></div>
        </div>

        <div class="input-area">
            <textarea id="md-input" placeholder="Paste your Obsidian .md content here…&#10;&#10;The extractor will parse entities (anatomy, pathology, procedures, nerves, vessels, drugs, concepts) and relationships from your notes."></textarea>
        </div>

        <div class="extract-bar">
            <button id="btn-extract" class="btn btn-primary" disabled>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                Extract
            </button>
            <span id="char-count" class="char-count">0 chars</span>
        </div>
    </div>

    <!-- Right: Output -->
    <div class="panel">
        <div class="panel-header">
            <span class="panel-title">Extracted Graph</span>
            <div id="preview-stats" class="preview-stats" style="display:none;">
                <span class="stat-badge nodes" id="stat-nodes">0 nodes</span>
                <span class="stat-badge edges" id="stat-edges">0 edges</span>
            </div>
        </div>

        <div id="status-bar" class="status-bar" style="display:none;">
            <div id="spinner" class="spinner"></div>
            <span id="status-text" class="status-text">Extracting…</span>
        </div>

        <div class="output-area">
            <div id="json-output">
                <div class="empty-state" id="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
                    <p>No extraction yet</p>
                    <p class="hint">Paste Markdown on the left and click Extract to generate graph JSON</p>
                </div>
            </div>
        </div>

        <div id="output-actions" class="btn-row" style="display:none;">
            <button id="btn-copy" class="btn btn-secondary">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                Copy JSON
            </button>
            <button id="btn-download" class="btn btn-secondary">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download
            </button>
            <button id="btn-merge" class="btn btn-success">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M8 3H3v5"/><path d="M12 22v-8.3a4 4 0 00-1.172-2.872L3 3"/><path d="M21 3l-7.828 7.828A4 4 0 0012 13.7V22"/></svg>
                Merge into Atlas
            </button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
(function() {
    'use strict';

    /* ── Constants ─────────────────────────────────── */
    const VALID_NODE_TYPES = ['anatomy','pathology','procedure','nerve','vessel','drug','concept'];
    const VALID_EDGE_TYPES = ['innervates','supplies','drains_to','landmark_for','complication_of','differentiates_from','treats','staged_with','arises_from','contained_in','branches_from'];
    const VALID_SUBSPECIALTIES = ['rhinology','otology','head-neck-onc','laryngology','peds-ent','skull-base','facial-plastics'];

    const SYSTEM_PROMPT = `You are a medical knowledge graph extractor for Otolaryngology–Head and Neck Surgery.
Extract ALL entities and relationships from the provided Markdown text.
Return ONLY valid JSON matching this schema exactly — no prose, no markdown fences:
{
  "nodes": [NodeObject, ...],
  "edges": [EdgeObject, ...]
}
Node types: anatomy | pathology | procedure | nerve | vessel | drug | concept
Edge types: innervates | supplies | drains_to | landmark_for | complication_of | differentiates_from | treats | staged_with | arises_from | contained_in | branches_from
Subspecialties: rhinology | otology | head-neck-onc | laryngology | peds-ent | skull-base | facial-plastics
For each node: generate a slug id (kebab-case), label, type, subspecialty (infer from context), detail (1-3 sentence clinical pearl), sources (empty array if unknown), corrections (empty array), leitner: {box:1, nextReview: today ISO}.
For each edge: use existing node ids. Only emit edges where both nodes appear in output.
Be exhaustive. Prefer more nodes over fewer.`;

    const MODEL = 'claude-sonnet-4-20250514';
    const API_URL = 'https://api.anthropic.com/v1/messages';

    /* ── DOM refs ──────────────────────────────────── */
    const apiKeyInput   = document.getElementById('api-key');
    const apiStatus     = document.getElementById('api-status');
    const mdInput       = document.getElementById('md-input');
    const btnExtract    = document.getElementById('btn-extract');
    const charCount     = document.getElementById('char-count');
    const jsonOutput    = document.getElementById('json-output');
    const emptyState    = document.getElementById('empty-state');
    const statusBar     = document.getElementById('status-bar');
    const spinner       = document.getElementById('spinner');
    const statusText    = document.getElementById('status-text');
    const previewStats  = document.getElementById('preview-stats');
    const statNodes     = document.getElementById('stat-nodes');
    const statEdges     = document.getElementById('stat-edges');
    const outputActions = document.getElementById('output-actions');
    const btnCopy       = document.getElementById('btn-copy');
    const btnDownload   = document.getElementById('btn-download');
    const btnMerge      = document.getElementById('btn-merge');
    const toastEl       = document.getElementById('toast');

    let extractedData = null;
    let isExtracting = false;

    /* ── Helpers ───────────────────────────────────── */
    function toast(msg, type = '') {
        toastEl.textContent = msg;
        toastEl.className = 'toast ' + type + ' show';
        clearTimeout(toastEl._t);
        toastEl._t = setTimeout(() => { toastEl.className = 'toast'; }, 2500);
    }

    function showStatus(msg, isError = false) {
        statusBar.style.display = 'flex';
        spinner.style.display = isError ? 'none' : '';
        statusText.textContent = msg;
        statusText.className = 'status-text' + (isError ? ' error' : '');
    }

    function hideStatus() {
        statusBar.style.display = 'none';
    }

    function updateExtractButton() {
        const hasKey = apiKeyInput.value.trim().length > 0;
        const hasText = mdInput.value.trim().length > 0;
        btnExtract.disabled = !hasKey || !hasText || isExtracting;
    }

    /* ── API Key persistence ──────────────────────── */
    const savedKey = localStorage.getItem('kag-api-key') || '';
    if (savedKey) {
        apiKeyInput.value = savedKey;
        apiStatus.className = 'api-status saved';
        apiStatus.title = 'Saved';
    }

    apiKeyInput.addEventListener('input', () => {
        const key = apiKeyInput.value.trim();
        if (key) {
            localStorage.setItem('kag-api-key', key);
            apiStatus.className = 'api-status saved';
            apiStatus.title = 'Saved';
        } else {
            localStorage.removeItem('kag-api-key');
            apiStatus.className = 'api-status empty';
            apiStatus.title = 'Not set';
        }
        updateExtractButton();
    });

    /* ── Char count ────────────────────────────────── */
    mdInput.addEventListener('input', () => {
        const len = mdInput.value.length;
        charCount.textContent = len.toLocaleString() + ' chars';
        charCount.className = 'char-count' + (len > 40000 ? ' warn' : '');
        updateExtractButton();
    });

    /* ── Extract ──────────────────────────────────── */
    btnExtract.addEventListener('click', doExtract);

    async function doExtract() {
        if (isExtracting) return;
        const key = apiKeyInput.value.trim();
        const md  = mdInput.value.trim();
        if (!key || !md) return;

        isExtracting = true;
        updateExtractButton();
        extractedData = null;
        emptyState.style.display = 'none';
        outputActions.style.display = 'none';
        previewStats.style.display = 'none';
        showStatus('Sending to Claude API…');

        let fullResponse = '';

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': key,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    model: MODEL,
                    max_tokens: 8192,
                    system: SYSTEM_PROMPT,
                    messages: [{ role: 'user', content: md }],
                    stream: true
                })
            });

            if (!res.ok) {
                const errBody = await res.text();
                let errMsg = `API error ${res.status}`;
                try { errMsg = JSON.parse(errBody).error?.message || errMsg; } catch(e) {}
                throw new Error(errMsg);
            }

            showStatus('Streaming response…');

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const data = line.slice(6).trim();
                        if (data === '[DONE]') continue;
                        try {
                            const event = JSON.parse(data);
                            if (event.type === 'content_block_delta' && event.delta?.text) {
                                fullResponse += event.delta.text;
                                jsonOutput.textContent = fullResponse;
                                jsonOutput.scrollTop = jsonOutput.scrollHeight;
                            }
                        } catch(e) { /* skip malformed SSE */ }
                    }
                }
            }

            // Parse the complete response
            showStatus('Validating JSON…');
            const parsed = parseAndValidate(fullResponse);
            extractedData = parsed;

            // Show stats
            statNodes.textContent = parsed.nodes.length + ' nodes';
            statEdges.textContent = parsed.edges.length + ' edges';
            previewStats.style.display = 'flex';
            outputActions.style.display = 'flex';

            // Pretty print
            jsonOutput.textContent = JSON.stringify(parsed, null, 2);

            showStatus('Extraction complete — ' + parsed.nodes.length + ' nodes, ' + parsed.edges.length + ' edges');
            statusText.className = 'status-text success';
            spinner.style.display = 'none';

        } catch (err) {
            showStatus('Error: ' + err.message, true);
            if (!fullResponse) {
                jsonOutput.innerHTML = '';
                emptyState.style.display = '';
            }
        } finally {
            isExtracting = false;
            updateExtractButton();
        }
    }

    /* ── Validation ────────────────────────────────── */
    function parseAndValidate(raw) {
        // Strip markdown fences if Claude wraps anyway
        let cleaned = raw.trim();
        if (cleaned.startsWith('```')) {
            cleaned = cleaned.replace(/^```(?:json)?\s*/i, '').replace(/\s*```\s*$/, '');
        }

        const data = JSON.parse(cleaned);

        if (!Array.isArray(data.nodes)) throw new Error('Missing or invalid "nodes" array');
        if (!Array.isArray(data.edges)) throw new Error('Missing or invalid "edges" array');

        const today = new Date().toISOString().split('T')[0];

        // Validate & fix nodes
        const nodeIds = new Set();
        data.nodes = data.nodes.map(n => {
            if (!n.id || !n.label) throw new Error('Node missing id or label: ' + JSON.stringify(n));
            n.type = VALID_NODE_TYPES.includes(n.type) ? n.type : 'concept';
            n.subspecialty = VALID_SUBSPECIALTIES.includes(n.subspecialty) ? n.subspecialty : 'rhinology';
            n.detail = n.detail || '';
            n.sources = Array.isArray(n.sources) ? n.sources : [];
            n.corrections = Array.isArray(n.corrections) ? n.corrections : [];
            n.leitner = n.leitner || { box: 1, nextReview: today };
            if (!n.leitner.nextReview) n.leitner.nextReview = today;
            nodeIds.add(n.id);
            return n;
        });

        // Validate & filter edges
        data.edges = data.edges.filter(e => {
            if (!nodeIds.has(e.source) || !nodeIds.has(e.target)) return false;
            e.type = VALID_EDGE_TYPES.includes(e.type) ? e.type : 'contained_in';
            return true;
        });

        return data;
    }

    /* ── Copy ──────────────────────────────────────── */
    btnCopy.addEventListener('click', () => {
        if (!extractedData) return;
        navigator.clipboard.writeText(JSON.stringify(extractedData, null, 2)).then(() => {
            toast('Copied to clipboard', 'success');
        }).catch(() => toast('Copy failed', 'error'));
    });

    /* ── Download ──────────────────────────────────── */
    btnDownload.addEventListener('click', () => {
        if (!extractedData) return;
        const blob = new Blob([JSON.stringify(extractedData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'kag-patch-' + new Date().toISOString().split('T')[0] + '.json';
        a.click();
        URL.revokeObjectURL(url);
        toast('Downloaded patch.json', 'success');
    });

    /* ── Merge into Atlas ─────────────────────────── */
    btnMerge.addEventListener('click', () => {
        if (!extractedData) return;

        let existing;
        try {
            existing = JSON.parse(localStorage.getItem('kag-graph')) || { nodes: [], edges: [] };
        } catch(e) {
            existing = { nodes: [], edges: [] };
        }

        // Dedup nodes by id
        const existingIds = new Set(existing.nodes.map(n => n.id));
        let addedNodes = 0;
        for (const node of extractedData.nodes) {
            if (!existingIds.has(node.id)) {
                existing.nodes.push(node);
                existingIds.add(node.id);
                addedNodes++;
            }
        }

        // Dedup edges by source+target+type
        const existingEdgeKeys = new Set(existing.edges.map(e => e.source + '|' + e.target + '|' + e.type));
        let addedEdges = 0;
        for (const edge of extractedData.edges) {
            const key = edge.source + '|' + edge.target + '|' + edge.type;
            if (!existingEdgeKeys.has(key)) {
                existing.edges.push(edge);
                existingEdgeKeys.add(key);
                addedEdges++;
            }
        }

        localStorage.setItem('kag-graph', JSON.stringify(existing));
        toast(`Merged: +${addedNodes} nodes, +${addedEdges} edges`, 'success');
    });

    /* ── Init ──────────────────────────────────────── */
    updateExtractButton();

})();
</script>
</body>
</html>
